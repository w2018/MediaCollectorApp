name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK with R8
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Sign APK with debug keystore
        run: |
          # 定位 build-tools
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          if [ ! -d "$BUILD_TOOLS" ]; then
            BUILD_TOOLS=$(ls -d "$ANDROID_HOME/build-tools/"*/ | head -1)
          fi
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="${UNSIGNED/-unsigned/-aligned}"
          SIGNED="app/build/outputs/apk/release/MediaCollectorApp-release.apk"

          # 创建 debug keystore
          KEYSTORE="$HOME/.android/debug.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v -keystore "$KEYSTORE" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

          # Zip align
          "$BUILD_TOOLS/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"

          # 签名
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$SIGNED" "$ALIGNED"

          echo "Signed APK: $SIGNED"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaCollectorApp-release
          path: app/build/outputs/apk/release/MediaCollectorApp-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MediaCollectorApp-release

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: MediaCollectorApp-release.apk
          name: MediaCollectorApp ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
